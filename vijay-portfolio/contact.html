<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact — Vijay Sakar</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background-color: #100c17;
      color: white;
    }
    .nav-glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(8px);
    }
    .card-3d {
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
      border-radius: 15px;
    }
    .typewriter span {
      border-right: .1em solid #fff;
      white-space: nowrap;
      overflow: hidden;
      display: inline-block;
      animation: blink 0.7s infinite;
    }
    @keyframes blink {
      50% { border-color: transparent; }
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-dark nav-glass">
    <div class="container">
      <a class="navbar-brand" href="index.html">Vijay Sakar</a>
      <a class="btn btn-light" href="index.html" target="_blank">Back</a>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8 text-center">
        <!-- Typewriter Heading -->
        <h2 class="typewriter" id="typeText"></h2>
        <p data-aos="fade-up" data-aos-delay="100">
          Send a message or connect on GitHub/LinkedIn.
        </p>

        <div class="card card-3d bg-secondary text-light" data-aos="fade-up" data-aos-delay="200">
          <div class="card-body">
            <form id="contactForm" onsubmit="return handleContact(event)">
              <div class="mb-3">
                <label class="form-label">Name</label>
                <input id="name" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input id="email" type="email" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea id="message" rows="5" class="form-control" required></textarea>
              </div>
              <div class="d-flex justify-content-end">
                <button class="btn btn-light" type="submit">Send</button>
              </div>
              <div id="contactResult" class="mt-3" aria-live="polite"></div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 700, once: true });

    // ✅ Typewriter Effect
    const text = "Contact Me ";
    const speed = 120; // milliseconds per letter
    let i = 0;

    function typeEffect() {
      if (i < text.length) {
        document.getElementById("typeText").innerHTML =
          "<span>" + text.substring(0, i + 1) + "</span>";
        i++;
        setTimeout(typeEffect, speed);
      }
    }
    window.onload = typeEffect;

    // ✅ Contact form simulation
    function handleContact(event) {
      event.preventDefault();
      document.getElementById("contactResult").innerHTML =
        "<div class='alert alert-success mt-3'>✅ Message Sent Successfully!</div>";
      event.target.reset();
      return false;
    }
  </script>
</body>
</html>
